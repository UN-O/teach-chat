<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#B6D0E2"/>
  <text x="50%" y="45%" font-family="sans-serif" font-size="16" fill="#2A3D66" text-anchor="middle" dominant-baseline="middle" font-weight="500">Hero 插畫</text>
  <text x="50%" y="58%" font-family="sans-serif" font-size="13" fill="#2A3D66" text-anchor="middle" dominant-baseline="middle" opacity="0.7">年輕老師坐在書桌前，看著手機螢幕微微皺眉，暖色系，身後有柔和光線</text>
</svg>
